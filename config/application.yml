
server:
  port: 80

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} : %msg%n"
  level:
    com.core.webhook: DEBUG

spring:
  application:
    name: core-webhook
  cloud:
    openfeign:
      client:
        config:
          mercadoPago:
            url: https://api.mercadopago.com
            connectTimeout: 5000
            readTimeout: 10000
            loggerLevel: FULL
          default:
            connectTimeout: 5000
            readTimeout: 10000
            loggerLevel: FULL

  # 1. Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379

  # 2. Datasource Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/payments?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 3. JPA/Hibernate Configuration
  jpa:
    show-sql: true # Log SQL statements
    hibernate:
      ddl-auto: none # Options: none, update, create, create-drop, validate
    properties:
      hibernate:
        # Specifies the MySQL Dialect for Hibernate
        dialect: org.hibernate.dialect.MySQLDialect

mercadopago:
  webhook:
    secret: 4fbabe4529465841943d3ca0500c88e595288c6cf386e0ec60f6dbdb03d16a89
    validate-signature: false

jobs:
  webhook-event:
    cron: "0 * * * * *"
    batch-size: 50

resilience4j:
  circuitbreaker:
    instances:
      mercadoPago:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - feign.FeignException$NotFound
          - feign.FeignException$BadRequest